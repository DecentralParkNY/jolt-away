<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root { --neon: #ccff00; --dark: #0a0a0a; }
  body, html { margin: 0; padding: 0; background: var(--dark); color: var(--neon); font-family: 'Courier New', monospace; overflow: hidden; height: 100vh; }
  #app { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .hero { text-align: center; z-index: 10; pointer-events: none; }
  h1 { font-size: 4rem; margin: 0; text-transform: uppercase; letter-spacing: -2px; line-height: 0.9; }
  p { font-size: 1.2rem; opacity: 0.8; margin-bottom: 2rem; }
  .chaos-field { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
  .noise { position: absolute; background: var(--neon); color: var(--dark); padding: 5px 10px; font-weight: bold; font-size: 10px; pointer-events: none; transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s; }
  #jolt-btn { position: absolute; bottom: 50px; z-index: 100; background: var(--neon); color: var(--dark); border: none; padding: 20px 40px; font-family: inherit; font-weight: 900; font-size: 1.5rem; cursor: pointer; text-transform: uppercase; box-shadow: 0 0 20px var(--neon); transition: transform 0.1s; }
  #jolt-btn:active { transform: scale(0.9); }
  .shockwave { position: absolute; border: 4px solid var(--neon); border-radius: 50%; pointer-events: none; animation: ripple 0.6s ease-out forwards; z-index: 5; }
  @keyframes ripple { from { width: 0; height: 0; opacity: 1; } to { width: 200vw; height: 200vw; opacity: 0; } }
</style>
</head>
<body>
  <div id="app">
    <div class="hero">
      <h1>JOLT</h1>
      <p>Instant Digital Exorcism for Visual Noise</p>
    </div>
    <div class="chaos-field" id="field"></div>
    <button id="jolt-btn">HOLD TO JOLT</button>
  </div>
  <script>
    const field = document.getElementById('field');
    const btn = document.getElementById('jolt-btn');
    const noiseElements = [];
    const labels = ['AD', 'POPUP', 'NOTIF', 'ALERT', 'BUY NOW', 'ERROR 404', 'UPDATE', 'COOKIE', 'SPAM', 'TOS'];

    for(let i=0; i<60; i++) {
      const div = document.createElement('div');
      div.className = 'noise';
      div.innerText = labels[Math.floor(Math.random()*labels.length)];
      div.style.left = Math.random() * 100 + 'vw';
      div.style.top = Math.random() * 100 + 'vh';
      div.style.transform = `rotate(${Math.random()*360}deg)`;
      field.appendChild(div);
      noiseElements.push(div);
    }

    let isJolting = false;
    const startJolt = () => {
      isJolting = true;
      const wave = document.createElement('div');
      wave.className = 'shockwave';
      wave.style.left = '50%';
      wave.style.top = '50%';
      wave.style.transform = 'translate(-50%, -50%)';
      document.body.appendChild(wave);
      setTimeout(() => wave.remove(), 600);

      noiseElements.forEach(el => {
        const rect = el.getBoundingClientRect();
        const angle = Math.atan2(rect.top - window.innerHeight/2, rect.left - window.innerWidth/2);
        const dist = 2000;
        el.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px) rotate(720deg)`;
        el.style.opacity = '0';
      });
    };

    const stopJolt = () => {
      isJolting = false;
      noiseElements.forEach(el => {
        el.style.transform = '';
        el.style.opacity = '1';
        el.style.left = Math.random() * 100 + 'vw';
        el.style.top = Math.random() * 100 + 'vh';
      });
    };

    btn.addEventListener('mousedown', startJolt);
    btn.addEventListener('mouseup', stopJolt);
    btn.addEventListener('touchstart', (e) => { e.preventDefault(); startJolt(); });
    btn.addEventListener('touchend', stopJolt);
  </script>
</body>
</html>
